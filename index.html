<script>
const firebaseConfig = {
  apiKey: "AIzaSyDcedJtvKCu_qjgJru_moBDflyA6S3YKX4",
  authDomain: "wordholic-b84b7.firebaseapp.com",
  projectId: "wordholic-b84b7",
  storageBucket: "wordholic-b84b7.firebasestorage.app",
  messagingSenderId: "653808647521",
  appId: "1:653808647521:web:b3734d1d221284cd681920"
};

try {
  firebase.initializeApp(firebaseConfig);
} catch(e) {}
const db = firebase.firestore();

const deviceId = localStorage.getItem('wh_device_id') || (function(){
  const id = 'device_' + Math.random().toString(36).slice(2);
  localStorage.setItem('wh_device_id', id);
  return id;
})();

window.fbSaveProgress = function(dataKey, progressData) {
  if (!dataKey) return;
  db.collection('progress').doc(dataKey).set(Object.assign({}, progressData, {
    updatedAt: Date.now(),
    deviceId: deviceId
  })).then(function(){ console.log('Firebase保存完了'); })
    .catch(function(e){ console.log('Firebase保存エラー:', e.message); });
};

window.fbLoadProgress = function(dataKey) {
  if (!dataKey) return Promise.resolve(null);
  return db.collection('progress').doc(dataKey).get().then(function(snap){
    if (snap.exists) { console.log('Firebase読み込み完了'); return snap.data(); }
    return null;
  }).catch(function(){ return null; });
};

window.fbSaveWords = function(dataKey, words) {
  if (!dataKey) return;
  db.collection('words').doc(dataKey).set({ words: words, updatedAt: Date.now() })
    .catch(function(){});
};

window.fbLoadWords = function(dataKey) {
  if (!dataKey) return Promise.resolve(null);
  return db.collection('words').doc(dataKey).get().then(function(snap){
    if (snap.exists) return snap.data().words;
    return null;
  }).catch(function(){ return null; });
};

window.fbReady = true;
console.log('Firebase初期化完了');
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1a16;--paper:#f5f0e8;--cream:#ede7d4;--accent:#c0392b;--accent2:#2980b9;
  --muted:#7a7060;--border:#c8bfa8;--card:#fff8ee;--shadow:rgba(0,0,0,0.12);
  --bm-pron:#e67e22;--bm-mem:#8e44ad;--speak:#1a7a4a;
}
body{font-family:'BIZ UDGothic',sans-serif;background:var(--paper);color:var(--ink)}
#app{max-width:900px;margin:0 auto;padding:24px 20px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;border-bottom:2px solid var(--ink);padding-bottom:12px;flex-wrap:wrap;gap:10px}
.logo{font-family:'BIZ UDGothic',sans-serif;font-size:24px;font-weight:700;letter-spacing:2px;color:var(--accent)}
.logo span{color:var(--ink);font-size:12px;font-weight:400;display:block;letter-spacing:3px;margin-top:2px}
.header-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:7px;border:1.5px solid var(--border);background:var(--card);color:var(--ink);font-family:'BIZ UDGothic',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--cream);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:.9}
.btn-good{background:#27ae60;color:#fff;border-color:#27ae60}
.btn-bad{background:var(--accent);color:#fff}
input[type=file]{display:none}

/* Speak button */
.speak-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:20px;border:1.5px solid var(--speak);background:var(--card);color:var(--speak);font-family:'BIZ UDGothic',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;font-weight:600}
.speak-btn:hover{background:var(--speak);color:#fff}
.speak-btn.speaking{background:var(--speak);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.speak-btn svg{width:16px;height:16px;fill:currentColor}

/* Voice settings bar */
.voice-bar{background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.voice-bar label{font-size:12px;color:var(--muted);letter-spacing:1px}
.voice-bar select,.voice-bar input[type=range]{font-size:12px;font-family:'BIZ UDGothic',sans-serif}
.voice-bar input[type=range]{width:90px;accent-color:var(--speak)}
.voice-val{font-size:12px;color:var(--ink);min-width:24px}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.filter-label{font-size:12px;color:var(--muted);letter-spacing:1px;margin-right:4px}
.filter-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-family:'BIZ UDGothic',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.filter-btn.active-all{background:var(--ink);color:#fff;border-color:var(--ink)}
.filter-btn.active-pron{background:var(--bm-pron);color:#fff;border-color:var(--bm-pron)}
.filter-btn.active-mem{background:var(--bm-mem);color:#fff;border-color:var(--bm-mem)}
.filter-count{font-size:11px;opacity:.8}

/* Stats */
.stats-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;flex:1;min-width:60px}
.stat-n{font-size:20px;font-weight:700;color:var(--accent);font-family:'BIZ UDGothic',sans-serif}
.stat-n.pron{color:var(--bm-pron)}
.stat-n.mem{color:var(--bm-mem)}
.stat-l{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:16px;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.tab{flex:1;padding:9px 0;text-align:center;cursor:pointer;font-size:13px;background:var(--cream);color:var(--muted);border:none;font-family:'BIZ UDGothic',sans-serif;transition:background .15s;border-right:1px solid var(--border)}
.tab:last-child{border-right:none}
.tab.active{background:var(--accent);color:#fff;font-weight:600}
.prog-bar{height:5px;background:var(--cream);border-radius:3px;margin-bottom:16px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}

/* Bookmark row */
.bm-row{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.bm-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-family:'BIZ UDGothic',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.bm-btn.on-pron{background:var(--bm-pron);color:#fff;border-color:var(--bm-pron)}
.bm-btn.on-mem{background:var(--bm-mem);color:#fff;border-color:var(--bm-mem)}
.bm-btn.off{background:var(--card);color:var(--muted)}

/* Flash card */
.card-wrap{perspective:1000px;margin-bottom:14px}
.card{width:100%;min-height:260px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;min-height:260px;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 32px;background:var(--card);border:1.5px solid var(--border);box-shadow:0 4px 20px var(--shadow)}
.card-back{transform:rotateY(180deg);background:var(--cream)}
.card-label{font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;text-transform:uppercase}
.card-word{font-family:'BIZ UDGothic',sans-serif;font-size:30px;font-weight:700;color:var(--ink);text-align:center;line-height:1.4}
.card-hint{font-size:12px;color:var(--border);margin-top:14px}
.card-phonetic{font-size:30px;color:var(--muted);margin-top:6px;letter-spacing:1.5px;font-family:'BIZ UDGothic',sans-serif;font-style:italic;min-height:24px;text-align:center;display:block;width:100%}
.bm-indicators{position:absolute;top:12px;right:14px;display:flex;gap:6px}
.bm-dot{width:10px;height:10px;border-radius:50%}
.bm-dot.pron{background:var(--bm-pron)}
.bm-dot.mem{background:var(--bm-mem)}
.card-speak{position:absolute;bottom:12px;right:14px}
.nav-btns{display:flex;gap:10px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.nav-side-btn{width:64px;min-height:90px;font-size:15px;font-weight:700;line-height:1.6;text-align:center;padding:12px 8px;border-radius:10px;}

/* Typing */
.typing-area{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:28px;text-align:center;margin-bottom:14px}
.typing-q{font-family:'BIZ UDGothic',sans-serif;font-size:26px;font-weight:700;margin-bottom:16px}
.typing-input{width:100%;max-width:340px;padding:11px 16px;border:2px solid var(--border);border-radius:8px;font-size:17px;font-family:'BIZ UDGothic',sans-serif;background:var(--paper);color:var(--ink);text-align:center;outline:none;transition:border-color .2s}
.typing-input:focus{border-color:var(--accent2)}
.typing-input.correct{border-color:#27ae60;background:#f0fff4}
.typing-input.wrong{border-color:var(--accent);background:#fff0f0}
.typing-ans{font-size:14px;margin-top:12px;min-height:20px;font-weight:600}

/* Slide */
.slide-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:36px;text-align:center;min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 4px 20px var(--shadow);position:relative}
.slide-jp{font-family:'BIZ UDGothic',sans-serif;font-size:26px;font-weight:700;color:var(--muted);margin-bottom:12px}
.slide-en{font-size:30px;font-weight:600;color:var(--ink);font-family:'BIZ UDGothic',sans-serif}
.slide-speak{margin-top:18px}
.slide-controls{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}

/* List */
.list-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.list-table th{background:var(--cream);padding:9px 12px;font-size:11px;letter-spacing:1px;color:var(--muted);text-align:left;border-bottom:1px solid var(--border)}
.list-table td{padding:9px 12px;font-size:13px;border-bottom:.5px solid var(--border)}
.list-table tr:last-child td{border-bottom:none}
.list-table tr:hover td{background:var(--cream)}
.bm-icon{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:3px}
.bm-icon.pron{background:var(--bm-pron)}
.bm-icon.mem{background:var(--bm-mem)}
.badge-known{background:#e8f8f0;color:#27ae60;border-radius:4px;padding:2px 7px;font-size:11px}
.badge-unk{background:#fdf0f0;color:var(--accent);border-radius:4px;padding:2px 7px;font-size:11px}
.empty-filter{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* ── スマホ対応 ─────────────────────────────────────── */
@media (max-width: 600px) {
  #app{padding:12px 10px}
  .header{flex-direction:column;align-items:flex-start;gap:8px}
  .header-btns{flex-wrap:wrap;gap:6px}
  .btn{padding:8px 12px;font-size:12px}
  .logo{font-size:20px}
  .stats-bar{gap:6px}
  .stat{padding:6px 8px;min-width:50px}
  .stat-n{font-size:16px}
  .stat-l{font-size:9px}
  .tabs{font-size:12px}
  .tab{padding:8px 0;font-size:12px}
  .card-word{font-size:22px}
  .card-phonetic{font-size:20px}
  .nav-side-btn{width:50px;min-height:70px;font-size:13px}
  .speak-btn{padding:8px 14px;font-size:13px}
  .voice-bar{gap:8px;padding:10px 12px}
  .voice-bar select{font-size:11px;max-width:120px}
  .filter-bar{gap:6px}
  .filter-btn{padding:6px 10px;font-size:12px}
  .list-table th,.list-table td{padding:6px 8px;font-size:12px}
  .typing-q{font-size:20px}
  .typing-input{font-size:15px}
  .slide-jp{font-size:20px}
  .slide-en{font-size:22px}
  .search-input{font-size:13px}
  #search-input{font-size:13px}
}
select{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--paper);font-family:'BIZ UDGothic',sans-serif;font-size:13px;color:var(--ink)}
.list-speak-btn{padding:4px 10px;border-radius:14px;border:1px solid var(--speak);background:var(--card);color:var(--speak);font-size:12px;cursor:pointer;font-family:'BIZ UDGothic',sans-serif}
.list-speak-btn:hover{background:var(--speak);color:#fff}
</style>

<div id="app">
  <div class="header">
    <div class="logo">Lingo Lab<span>英語学習アプリ</span></div>
    <div id="file-name-display" style="font-size:18px;color:var(--muted);letter-spacing:1px;margin-top:4px;font-family:'BIZ UDGothic',sans-serif;font-weight:700"></div>
    <div class="header-btns">
      <label class="btn" style="cursor:pointer" for="xl">📂 Excel読み込む</label>
      <input type="file" id="xl" accept=".xlsx,.xls,.csv" onchange="loadFile(this)">
      <button class="btn" onclick="showAddCard()">➕ カード追加</button>
      <button class="btn" onclick="saveToExcel()">💾 Excel保存</button>
      <button class="btn" onclick="showStats()">📊 記録</button>
      <button class="btn" onclick="confirmReset()" title="進捗をリセット">🔄 リセット</button>
    </div>
  </div>

  <div id="main" style="display:none">
    <!-- 音声設定バー -->
    <div class="voice-bar">
      <span style="font-size:13px;font-weight:600;color:var(--speak)">🔊 読み上げ設定</span>
      <label>声：</label>
      <select id="voice-sel" onchange="setVoice()"></select>
      <label>速さ：</label>
      <input type="range" id="rate-sl" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('rate-v').textContent=parseFloat(this.value).toFixed(1)">
      <span class="voice-val" id="rate-v">1.0</span>
      <label>音量：</label>
      <input type="range" id="vol-sl" min="0" max="1" step="0.1" value="1" oninput="document.getElementById('vol-v').textContent=parseFloat(this.value).toFixed(1)">
      <span class="voice-val" id="vol-v">1.0</span>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="auto-speak" style="accent-color:var(--speak)"> 自動読み上げ
      </label>
    </div>

    <div class="stats-bar">
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">総単語数</div></div>
      <div class="stat"><div class="stat-n pron" id="s-pron">0</div><div class="stat-l">🎤 発音</div></div>
      <div class="stat"><div class="stat-n mem" id="s-mem">0</div><div class="stat-l">💡 記憶</div></div>
      <div class="stat"><div class="stat-n" id="s-known-flash">0</div><div class="stat-l">flash済</div></div>
      <div class="stat"><div class="stat-n" id="s-known-type">0</div><div class="stat-l">type済</div></div>
      <div class="stat"><div class="stat-n" id="s-known-slide">0</div><div class="stat-l">slide済</div></div>
      <div class="stat"><div class="stat-n" id="s-idx">1</div><div class="stat-l">現在</div></div>

    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <input id="search-input" type="text" placeholder="🔍 日本語・英語で検索..." 
        style="flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:14px;font-family:'BIZ UDGothic',sans-serif;background:var(--paper);color:var(--ink);outline:none"
        oninput="doSearch(this.value); if(mode==='flash')renderFlash();else if(mode==='type')renderType();else if(mode==='slide')renderSlide();else if(mode==='list')renderList();" onfocus="this.style.borderColor='var(--accent2)'" onblur="this.style.borderColor='var(--border)'">
      <button class="btn" onclick="clearSearch()" id="search-clear-btn" style="display:none;border-radius:20px">✕ クリア</button>
    </div>
    <div class="filter-bar">
      <span class="filter-label">表示：</span>
      <button class="filter-btn active-all" id="f-all" onclick="setFilter('all')">📚 全て <span class="filter-count" id="fc-all"></span></button>
      <button class="filter-btn" id="f-pron" onclick="setFilter('pron')">🎤 発音練習 <span class="filter-count" id="fc-pron"></span></button>
      <button class="filter-btn" id="f-mem" onclick="setFilter('mem')">💡 記憶 <span class="filter-count" id="fc-mem"></span></button>
      <button class="filter-btn" id="f-today" onclick="setFilter('today')">📅 今日 <span class="filter-count" id="fc-today"></span></button>
      <button class="filter-btn" id="f-yesterday" onclick="setFilter('yesterday')">📅 昨日 <span class="filter-count" id="fc-yesterday"></span></button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setMode('flash')">🃏 フラッシュ</button>
      <button class="tab" onclick="setMode('type')">⌨️ タイピング</button>
      <button class="tab" onclick="setMode('slide')">▶️ スライド</button>
      <button class="tab" onclick="setMode('list')">📋 一覧</button>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
    <div id="mode-flash"></div>
    <div id="mode-type" style="display:none"></div>
    <div id="mode-slide" style="display:none"><div id="slide-card-wrap"></div><div class="slide-controls"><button class="btn" id="slide-stop-btn" style="display:none" onclick="stopSlide()">⏹ 停止</button><button class="btn btn-primary" id="slide-start-btn" onclick="startSlide()">▶ 自動再生</button><span style="font-size:13px;color:var(--muted);margin-left:8px">間隔：</span><select id="speed-sel" onchange="slideSpeed=+this.value; if(slideTimer){clearTimeout(slideTimer);slideTimer=null;}"><option value="2">速い(2秒)</option><option value="3" selected>普通(3秒)</option><option value="5">ゆっくり(5秒)</option><option value="8">超ゆっくり(8秒)</option></select><button class="btn" style="margin-left:8px" onclick="navigate(-1)">←</button><button class="btn" onclick="navigate(1)">→</button></div></div>
    <div id="mode-list" style="display:none"></div>
  </div>
</div>

<!-- カード編集モーダル（静的HTML） -->
<div id="wh-editcard-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;align-items:center;justify-content:center">
  <div style="background:var(--card);border-radius:14px;padding:28px;max-width:400px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.2)">
    <div style="font-size:16px;font-weight:700;margin-bottom:20px;color:var(--ink)">✏️ カードを編集</div>
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">日本語</label>
      <textarea id="edit-jp" rows="2" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:'BIZ UDGothic',sans-serif;background:var(--paper);color:var(--ink);outline:none;box-sizing:border-box;resize:vertical"></textarea>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">English</label>
      <textarea id="edit-en" rows="2" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:'BIZ UDGothic',sans-serif;background:var(--paper);color:var(--ink);outline:none;box-sizing:border-box;resize:vertical"></textarea>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">発音記号 (任意)</label>
      <input id="edit-ph" type="text" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:'BIZ UDGothic',sans-serif;background:var(--paper);color:var(--ink);outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:20px">
      <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">補足説明 (任意)</label>
      <textarea id="edit-note" rows="3" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'BIZ UDGothic',sans-serif;background:var(--paper);color:var(--ink);outline:none;box-sizing:border-box;resize:vertical"></textarea>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let words=[], pronBM=new Set(), memBM=new Set(), studyCount={}, studyDates={}, searchQuery='';
let idxFlash=0, idxType=0, idxSlide=0;
let idxByFilter={}; // フィルター別idx
function getIdxKey(){ return mode+'_'+filter; }
function getIdx(){
  const k=getIdxKey();
  if(idxByFilter[k]!==undefined) return idxByFilter[k];
  return mode==='flash'?idxFlash:mode==='type'?idxType:idxSlide;
}
function setIdx(v){
  idxByFilter[getIdxKey()]=v;
  if(mode==='flash')idxFlash=v;else if(mode==='type')idxType=v;else idxSlide=v;
}
Object.defineProperty(window,'idx',{get:()=>getIdx(),set:(v)=>setIdx(v)});
// モード別進捗
let knownFlash=new Set(), knownType=new Set(), knownSlide=new Set();
function getKnown(){ return mode==='flash'?knownFlash:mode==='type'?knownType:knownSlide; }
// モード別known - getKnown()で取得
let mode='flash', filter='all', flipped=false, slideTimer=null, slideSpeed=3;
let voices=[], selectedVoice=null;
let _dataKey=''; // ファイル識別キー

// ── 発音記号キャッシュ ───────────────────────────────────
const phoneticCache={};

async function fetchPhonetic(word){
  const key=word.toLowerCase().trim();
  if(phoneticCache[key]!==undefined) return phoneticCache[key];
  try{
    const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(key)}`);
    if(!res.ok){phoneticCache[key]='';return '';}
    const data=await res.json();
    // phonetic フィールドか phonetics 配列から取得
    let ph=data[0]?.phonetic||'';
    if(!ph){
      const arr=data[0]?.phonetics||[];
      ph=(arr.find(p=>p.text)?.text)||'';
    }
    phoneticCache[key]=ph;
    return ph;
  }catch(e){phoneticCache[key]='';return '';}
}

// ── 進捗保存・復元 ──────────────────────────────────────
function saveProgress(){
  if(!_dataKey)return;
  const progressData = {
    idx:getIdx(), idxFlash, idxType, idxSlide, idxByFilter, filter, mode,
    knownFlash:[...knownFlash],
    knownType:[...knownType],
    knownSlide:[...knownSlide],
    pronBM:[...pronBM],
    memBM:[...memBM],
    studyCount,
    studyDates,
    updatedAt: Date.now()
  };
  try{
    localStorage.setItem('wh_prog_'+_dataKey, JSON.stringify(progressData));
    localStorage.setItem('wh_words_'+_dataKey, JSON.stringify(words));
    localStorage.setItem('wh_lastKey', _dataKey);
    const disp=document.getElementById('file-name-display');
    if(disp) localStorage.setItem('wh_dispName_'+_dataKey, disp.textContent);
  }catch(e){}
  // Firebaseにも保存
  if(window.fbSaveProgress) window.fbSaveProgress(_dataKey, progressData);
  if(window.fbSaveWords) window.fbSaveWords(_dataKey, words);
}

function restoreProgress(key){
  try{
    const raw=localStorage.getItem('wh_prog_'+key);
    if(!raw)return false;
    const d=JSON.parse(raw);
    idxFlash=d.idxFlash||d.idx||0;
    idxType=d.idxType||0;
    idxSlide=d.idxSlide||0;
    idxByFilter=d.idxByFilter||{};
    filter=d.filter||'all';
    mode=d.mode||'flash';
    knownFlash=new Set(d.knownFlash||d.known||[]);
    knownType=new Set(d.knownType||[]);
    knownSlide=new Set(d.knownSlide||[]);
    pronBM=new Set(d.pronBM||[]);
    memBM=new Set(d.memBM||[]);
    studyCount=d.studyCount||{};
    studyDates=d.studyDates||{};
    return true;
  }catch(e){return false;}
}

function tryAutoRestore(){
  try{
    const lastKey=localStorage.getItem('wh_lastKey');
    if(!lastKey)return false;
    const rawWords=localStorage.getItem('wh_words_'+lastKey);
    if(!rawWords)return false;
    words=JSON.parse(rawWords);
    if(!words.length)return false;
    _dataKey=lastKey;
    const dispName=localStorage.getItem('wh_dispName_'+lastKey)||'';
    const disp=document.getElementById('file-name-display');
    if(disp&&dispName) disp.textContent=dispName;
    const localOk=restoreProgress(lastKey);
    // Firebaseからより新しいデータがあれば上書き
    if(window.fbLoadProgress){
      window.fbLoadProgress(lastKey).then(fbData=>{
        if(!fbData)return;
        const fbTime=fbData.updatedAt||0;
        const localProg=JSON.parse(localStorage.getItem('wh_prog_'+lastKey)||'{}');
        const localTime=localProg.updatedAt||0;
        if(fbTime>localTime){
          console.log('Firebaseのデータが新しいので上書き');
          idxFlash=fbData.idxFlash||0;
          idxType=fbData.idxType||0;
          idxSlide=fbData.idxSlide||0;
          knownFlash=new Set(fbData.knownFlash||[]);
          knownType=new Set(fbData.knownType||[]);
          knownSlide=new Set(fbData.knownSlide||[]);
          pronBM=new Set(fbData.pronBM||[]);
          memBM=new Set(fbData.memBM||[]);
          studyCount=fbData.studyCount||{};
          updateStats();
          setMode(mode);
          showToast('📱 他のデバイスの進捗を同期しました');
        }
      }).catch(()=>{});
      // 単語データも確認
      window.fbLoadWords(lastKey).then(fbWords=>{
        if(!fbWords||!fbWords.length)return;
        if(fbWords.length!==words.length){
          words=fbWords;
          localStorage.setItem('wh_words_'+lastKey,JSON.stringify(words));
          updateStats();
          setMode(mode);
          showToast('📱 単語データを同期しました');
        }
      }).catch(()=>{});
    }
    return localOk;
  }catch(e){return false;}
}

  idxFlash=0;idxType=0;idxSlide=0;idxByFilter={};knownFlash=new Set();knownType=new Set();knownSlide=new Set();pronBM=new Set();memBM=new Set();studyCount={};studyDates={};filter='all';mode='flash';

function showToast(msg){

// ── Speech ──────────────────────────────────────────────
let _voiceLoadAttempts=0;
function loadVoices(){
  if(window.electronTTS) return;
  const all=window.speechSynthesis.getVoices();
  const enVoices=all.filter(v=>v.lang.startsWith('en'));
  const sel=document.getElementById('voice-sel');
  if(!sel)return;

  // オンライン音声（Ava等）を含む全音声が読み込まれたか確認
  // EXE環境ではオンライン音声の読み込みに時間がかかるため、増えた場合は再描画
  if(enVoices.length===0 && _voiceLoadAttempts<20){
    _voiceLoadAttempts++;
    setTimeout(loadVoices, 500);
    return;
  }
  // 前回より音声数が増えた（オンライン音声が追加された）場合も再描画
  if(enVoices.length > voices.length){
    voices=enVoices;
  } else if(voices.length===0){
    voices=enVoices;
  }
  if(!voices.length) return;

  // 現在選択中の声の名前を記憶して再選択に使う
  const prevName=selectedVoice?selectedVoice.name:'';

  sel.innerHTML='';
  voices.forEach((v,i)=>{
    const o=document.createElement('option');
    o.value=i;
    o.textContent=v.name+' ('+v.lang+')';
    sel.appendChild(o);
  });

  // 優先順位: 1)前回選択した声 2)Ava Online 3)en-US 4)先頭
  let chosen=-1;
  if(prevName){
    chosen=voices.findIndex(v=>v.name===prevName);
  }
  if(chosen<0){
    // "Ava" を名前に含むオンライン音声を探す
    chosen=voices.findIndex(v=>v.name.includes('Ava'));
  }
  if(chosen<0){
    chosen=voices.findIndex(v=>v.lang==='en-US');
  }
  if(chosen<0) chosen=0;
  sel.value=chosen;
  selectedVoice=voices[chosen];

  // オンライン音声がまだ追加される可能性があるため、
  // EXE環境向けに少し後にも再チェック（最大10回）
  if(_voiceLoadAttempts<10){
    _voiceLoadAttempts++;
    setTimeout(()=>{
      const newAll=window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
      if(newAll.length>voices.length) loadVoices();
    },1000);
  }
}
window.speechSynthesis.onvoiceschanged=loadVoices;
// EXE環境では onvoiceschanged が発火しないことがあるため複数タイミングで試みる
setTimeout(loadVoices,100);
setTimeout(loadVoices,500);
setTimeout(loadVoices,1500);
setTimeout(loadVoices,3000);


function setVoice(){
  const sel=document.getElementById('voice-sel');
  if(sel&&voices.length) selectedVoice=voices[+sel.value]||voices[0];
}

function speak(text){
  if(!text)return;
  const rate=parseFloat(document.getElementById('rate-sl')?.value||1);
  const volume=parseFloat(document.getElementById('vol-sl')?.value||1);

  // ★ Electron環境: PowerShell経由でAva Online (Windows TTS) を使う
  if(window.electronTTS){
    window.electronTTS.stop();
    const voice=document.getElementById('voice-sel')?.value||'en-US-AvaNeural';
    window.electronTTS.speak(text, rate, volume, voice);
    document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('speaking'));
    const active=document.querySelector('.speak-btn[data-text="'+CSS.escape(text)+'"]');
    if(active){
      active.classList.add('speaking');
      setTimeout(()=>active.classList.remove('speaking'), text.length*80+500);
    }
    return;
  }

  // ブラウザ環境: Web Speech API（従来通り）
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='en-US';
  if(selectedVoice) utt.voice=selectedVoice;
  utt.rate=rate;
  utt.volume=volume;
  utt.onstart=()=>{document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('speaking'));};
  utt.onend=()=>{document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('speaking'));};
  window.speechSynthesis.speak(utt);
  setTimeout(()=>{
    const active=document.querySelector('.speak-btn[data-text="'+CSS.escape(text)+'"]');
    if(active) active.classList.add('speaking');
  },50);
}

function speakCurrent(){
  const filt=getFiltered();
  if(!filt.length)return;
  speak(filt[Math.min(idx,filt.length-1)].en);
}

function speakBtnHtml(text){

    読み上げる
  </button>`;
}

function autoSpeak(){

}

// ── CSV パース（クォート・文字コード対応） ───────────────
function parseCSVLine(line){
  const result=[];
  let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  result.push(cur.trim());
  return result;
}

function parseCSV(text,key,fname){
  words=text.split(/\r?\n/).filter(l=>l.trim()).map(l=>{
    const p=parseCSVLine(l);
    const {en,ph}=parseEnPh(p[1]);
    const note=(p[2]||'').trim().replace(/\\n/g,'\n');
    return {jp:(p[0]||'').trim(), en, ph, note};
  }).filter(w=>w.jp&&w.en);
  _dataKey=key;
  document.getElementById('file-name-display').textContent='📄 '+fname;
  const restored=restoreProgress(key);
  if(!restored){idxFlash=0;idxType=0;idxSlide=0;idxByFilter={};knownFlash=new Set();knownType=new Set();knownSlide=new Set();pronBM=new Set();memBM=new Set();studyDates={};filter='all';}
  init(restored);
}

// ── B列パース：英語と発音記号を分離 ────────────────────
function parseEnPh(raw){
  const s=String(raw||'').trim();
  const m=s.match(/^(.*?)\s*(\/[^/]+\/)\s*$/);
  if(m) return {en:m[1].trim(), ph:m[2].trim()};
  return {en:s, ph:''};
}

// ── Data ────────────────────────────────────────────────
const DEMO=[
  ['りんご','apple'],['犬','dog'],['猫','cat'],['学校','school'],['本','book'],
  ['水','water'],['空','sky'],['友達','friend'],['時間','time'],['仕事','work'],
  ['食べる','to eat'],['走る','to run'],['美しい','beautiful'],['大きい','big'],['小さい','small'],
  ['昨日','yesterday'],['今日','today'],['明日','tomorrow'],['ありがとう','thank you'],['すみません','excuse me / sorry'],
];

function loadDemo(){
  words=DEMO.map(([j,e])=>({jp:j,en:e,ph:'',note:''}));
  _dataKey='demo';
  document.getElementById('file-name-display').textContent='📄 サンプルデータ';
  const restored=restoreProgress('demo');
  if(!restored){idxFlash=0;idxType=0;idxSlide=0;idxByFilter={};knownFlash=new Set();knownType=new Set();knownSlide=new Set();pronBM=new Set();memBM=new Set();studyDates={};filter='all';}
  init(restored);
}

function loadFile(input){
  const f=input.files[0];if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  // ファイル名をキーとして使用
  const key='file_'+f.name.replace(/[^a-zA-Z0-9]/g,'_');
  const dispName=f.name;
  document.getElementById('file-name-display').textContent='📄 '+dispName;
  if(ext==='csv'){
    // まずUTF-8で試み、文字化けしていたらShift-JISで再読み込み
    reader.onload=e=>{
      let text=e.target.result;
      // 文字化けチェック（置換文字が多い場合はShift-JISで再試行）
      if((text.match(/\ufffd/g)||[]).length>5){
        const r2=new FileReader();
        r2.onload=e2=>{parseCSV(e2.target.result,key,f.name);};
        r2.readAsText(f,'Shift-JIS');
        return;
      }
      parseCSV(text,key,f.name);
    };
    reader.readAsText(f,'UTF-8');
  } else {
    reader.onload=e=>{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      words=XLSX.utils.sheet_to_json(ws,{header:1,defval:''})
        .filter(r=>r[0]&&r[1]).map(r=>{
          const {en,ph}=parseEnPh(r[1]);
          const note=String(r[2]||'').trim();
          return {jp:String(r[0]).trim(), en, ph, note};
        });
      _dataKey=key;
      const restored=restoreProgress(key);
      if(!restored){idxFlash=0;idxType=0;idxSlide=0;idxByFilter={};knownFlash=new Set();knownType=new Set();knownSlide=new Set();pronBM=new Set();memBM=new Set();studyDates={};filter='all';}
      init(restored);
    };
    reader.readAsArrayBuffer(f);
  }
}

function getFiltered(){
  let base;
  if(filter==='pron') base=words.map((w,i)=>({...w,orig:i})).filter(w=>pronBM.has(w.orig));
  else if(filter==='mem') base=words.map((w,i)=>({...w,orig:i})).filter(w=>memBM.has(w.orig));
  else if(filter==='today'){
    const today=getStudyDate();
    base=words.map((w,i)=>({...w,orig:i})).filter(w=>(studyDates[w.orig]||[]).includes(today));
  }
  else if(filter==='yesterday'){
    const d=new Date();
    if(d.getHours()<2) d.setDate(d.getDate()-1);
    d.setDate(d.getDate()-1);
    const yesterday=d.toISOString().slice(0,10);
    base=words.map((w,i)=>({...w,orig:i})).filter(w=>(studyDates[w.orig]||[]).includes(yesterday));
  }
  else base=words.map((w,i)=>({...w,orig:i}));
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    base=base.filter(w=>w.jp.toLowerCase().includes(q)||w.en.toLowerCase().includes(q));
  }
  return base;
}

function init(restored){
  document.getElementById('main').style.display='block';
  loadVoices();
  if(window.electronTTS){
    const sel=document.getElementById('voice-sel');
    if(sel){
      sel.innerHTML='<option value="en-US-AvaNeural">Ava (自然・女性)</option><option value="en-US-AriaNeural">Aria (自然・女性)</option><option value="en-US-JennyNeural">Jenny (自然・女性)</option><option value="en-US-GuyNeural">Guy (自然・男性)</option>';
      sel.disabled=false;
    }
  }
  updateStats();
  setFilter(filter,true);
  setMode(mode);
  if(restored) showToast('📖 前回の続きから再開しました（'+idx+'番目）');
}

function updateStats(){
  const filt=getFiltered();
  document.getElementById('s-total').textContent=words.length;
  document.getElementById('s-pron').textContent=pronBM.size;
  document.getElementById('s-mem').textContent=memBM.size;
  document.getElementById('s-known-flash').textContent=knownFlash.size;
  document.getElementById('s-known-type').textContent=knownType.size;
  document.getElementById('s-known-slide').textContent=knownSlide.size;
  document.getElementById('s-idx').textContent=filt.length?(Math.min(idx,filt.length-1)+1)+'/'+filt.length:'0/0';
  document.getElementById('prog').style.width=(filt.length?Math.round((Math.min(idx,filt.length-1)+1)/filt.length*100):0)+'%';
  document.getElementById('fc-all').textContent='('+words.length+')';
  document.getElementById('fc-pron').textContent='('+pronBM.size+')';
  document.getElementById('fc-mem').textContent='('+memBM.size+')';
  const todayKey=getStudyDate();
  const d2=new Date(); if(d2.getHours()<2) d2.setDate(d2.getDate()-1); d2.setDate(d2.getDate()-1);
  const yesterdayKey=d2.toISOString().slice(0,10);
  const todayCount=words.filter((_,i)=>(studyDates[i]||[]).includes(todayKey)).length;
  const yestCount=words.filter((_,i)=>(studyDates[i]||[]).includes(yesterdayKey)).length;
  const fcToday=document.getElementById('fc-today'); if(fcToday) fcToday.textContent='('+todayCount+')';
  const fcYest=document.getElementById('fc-yesterday'); if(fcYest) fcYest.textContent='('+yestCount+')';
}

function setFilter(f,skipMode){
  filter=f;
  if(!skipMode && mode!=='flash') idx=0; // フラッシュ以外はリセット
  ['all','pron','mem','today','yesterday'].forEach(x=>{
    const el=document.getElementById('f-'+x); if(el) el.className='filter-btn'+(x===f?' active-all':'');
  });
  updateStats();
  if(!skipMode)setMode(mode);
}

function setMode(m){
  mode=m;
  ['flash','type','slide','list'].forEach(x=>{
    document.getElementById('mode-'+x).style.display=x===m?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['flash','type','slide','list'][i]===m);
  });
  if(slideTimer){clearTimeout(slideTimer);slideTimer=null;}
  if(window.electronTTS) window.electronTTS.stop();
  else window.speechSynthesis.cancel();
  if(m==='flash')renderFlash();
  else if(m==='type')renderType();
  else if(m==='slide')renderSlide();
  else if(m==='list')renderList();
}

function bmDotsHtml(oi){
  return`<div class="bm-indicators">${pronBM.has(oi)?'<div class="bm-dot pron"></div>':''}${memBM.has(oi)?'<div class="bm-dot mem"></div>':''}</div>`;
}
function bmRowHtml(oi){
  const ip=pronBM.has(oi),im=memBM.has(oi),sc=studyCount[oi]||0;
  return`<div class="bm-row">
    <button class="bm-btn ${ip?'on-pron':'off'}" onclick="toggleBM('pron',${oi})">🎤 ${ip?'発音練習中':'発音練習に追加'}</button>
    <button class="bm-btn ${im?'on-mem':'off'}" onclick="toggleBM('mem',${oi})">💡 ${im?'記憶中':'記憶に追加'}</button>
    <div style="display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--cream);border:1.5px solid var(--border);font-size:13px">
      <span>📚 学習回数: <strong>${sc}</strong></span>
      ${sc>0?`<button onclick="event.stopPropagation();studyCount[${oi}]=Math.max(0,(studyCount[${oi}]||0)-1);saveProgress();renderFlash()" style="padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:var(--paper);font-size:11px;cursor:pointer">-1</button>`:''}
      ${sc>0?`<button onclick="event.stopPropagation();if(confirm('このカードの学習回数をリセットしますか？')){studyCount[${oi}]=0;saveProgress();renderFlash()}" style="padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:var(--paper);font-size:11px;cursor:pointer">リセット</button>`:''}
    </div>
    <button onclick="event.stopPropagation();showEditCardByOrig(${oi})" style="padding:6px 16px;border-radius:20px;border:1.5px solid var(--accent2);background:var(--card);color:var(--accent2);font-size:13px;cursor:pointer;font-family:'BIZ UDGothic',sans-serif">✏️ カードを編集</button>
  </div>`;
}

function toggleBM(type,oi){
  if(type==='pron'){if(pronBM.has(oi))pronBM.delete(oi);else pronBM.add(oi);}
  else{if(memBM.has(oi))memBM.delete(oi);else memBM.add(oi);}
  updateStats();
  const filt=getFiltered();
  if(idx>=filt.length&&filt.length>0)idx=filt.length-1;
  if(mode==='flash')renderFlash();
  else if(mode==='type')renderType();
  else if(mode==='slide')renderSlide();
  else if(mode==='list')renderList();
  saveProgress();
}

// ── Flash ────────────────────────────────────────────────

function flipCard(){
  flipped=!flipped;
  const c=document.getElementById('fc');
  if(c)c.classList.toggle('flipped',flipped);
  if(flipped){
    const w=getFiltered()[Math.min(idx,getFiltered().length-1)];
    if(!w)return;
    // Electronアプリのみ自動読み上げ（スマホブラウザでは読み上げない）
    if(window.electronTTS) speak(w.en);
  }
  saveProgress();
}

function navigate(d){
  const filt=getFiltered();
  if(!filt.length)return;
  idx=((idx+d)+filt.length)%filt.length;
  updateStats();
  if(mode==='flash')renderFlash();
  else if(mode==='type')renderType();
  else if(mode==='slide')renderSlide();
  saveProgress();
}

function getStudyDate(){
  // 午前2時で日付切り替え
  const now=new Date();
  if(now.getHours()<2) now.setDate(now.getDate()-1);
  return now.toISOString().slice(0,10);
}

function recordStudy(){
  const dateKey='wh_study_'+getStudyDate();
  try{
    const cur=parseInt(localStorage.getItem(dateKey)||'0');
    localStorage.setItem(dateKey, cur+1);
  }catch(e){}
}

function getWeekStats(){
  const stats=[];
  for(let i=6;i>=0;i--){
    const d=new Date();
    if(d.getHours()<2) d.setDate(d.getDate()-1);
    d.setDate(d.getDate()-i);
    const key='wh_study_'+d.toISOString().slice(0,10);
    const label=(d.getMonth()+1)+'/'+(d.getDate());
    stats.push({label, count:parseInt(localStorage.getItem(key)||'0')});
  }
  return stats;
}

function showStats(){
  const stats=getWeekStats();
  const max=Math.max(...stats.map(s=>s.count),1);
  const bars=stats.map(s=>{
    const h=Math.round(s.count/max*60);
    const isToday=s===stats[stats.length-1];
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <div style="font-size:11px;color:var(--ink);font-weight:600">${s.count||''}</div>
      <div style="height:${h}px;min-height:2px;width:100%;background:${isToday?'var(--accent)':'var(--accent2)'};border-radius:4px 4px 0 0"></div>
      <div style="font-size:10px;color:var(--muted)">${s.label}</div>
    </div>`;
  }).join('');
  const today=stats[stats.length-1].count;
  let el=document.getElementById('wh-stats-modal');
  if(!el){el=document.createElement('div');el.id='wh-stats-modal';document.body.appendChild(el);}
  el.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center';
  el.innerHTML=`<div style="background:var(--card);border-radius:14px;padding:28px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.2)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-size:18px;font-weight:700;color:var(--ink)">📊 学習記録</div>
      <button onclick="document.getElementById('wh-stats-modal').style.display='none'" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button>
    </div>
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:36px;font-weight:700;color:var(--accent)">${today}</div>
      <div style="font-size:13px;color:var(--muted)">今日の学習済</div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:6px;height:80px;padding-bottom:0">
      ${bars}
    </div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px">過去7日間</div>
  </div>`;
  el.onclick=function(e){if(e.target===el)el.style.display='none';};
}

function markKnown(v){
  const filt=getFiltered();
  if(!filt.length)return;
  const oi=filt[Math.min(idx,filt.length-1)].orig;
  if(v){
    getKnown().add(oi);
    recordStudy();
    studyCount[oi]=(studyCount[oi]||0)+1;
    // 学習日付を記録
    if(!studyDates[oi]) studyDates[oi]=[];
    studyDates[oi].push(getStudyDate());
  } else getKnown().delete(oi);
  updateStats();
  if(idx<filt.length-1)navigate(1);else renderFlash();
  saveProgress();
}

// ── Typing ───────────────────────────────────────────────
function renderType(){
  const filt=getFiltered(),el=document.getElementById('mode-type');
  if(!filt.length){el.innerHTML=`<div class="empty-filter">📭 このフィルターに単語がありません</div>`;return;}
  const w=filt[Math.min(idx,filt.length-1)],oi=w.orig;
  el.innerHTML=`
    ${bmRowHtml(oi)}
    <div class="typing-area">
      <div class="card-label" style="margin-bottom:8px">この日本語を英語で入力</div>
      <div class="typing-q">${w.jp.replace(/\n/g,'<br>')}</div>
      <input class="typing-input" id="t-input" placeholder="英語を入力…" autocomplete="off" onkeydown="typeKey(event)">
      <div class="typing-ans" id="t-ans"></div>
      <div style="margin-top:16px">${speakBtnHtml(w.en)}</div>
    </div>
    <div class="nav-btns">
      <button class="btn" onclick="navigate(-1)">← 前へ</button>
      <button class="btn btn-primary" onclick="checkType()">確認 (Enter)</button>
      <button class="btn" onclick="navigate(1)">次へ →</button>
    </div>
    <div style="text-align:center;font-size:16px;font-weight:600;color:var(--accent2);margin-top:10px;cursor:pointer;padding:8px;border-radius:8px;border:1.5px solid var(--accent2)" onclick="jumpToCard()" title="番号を入力してジャンプ">${Math.min(idx,filt.length-1)+1} / ${filt.length} ✈</div>
  `;
  setTimeout(()=>{const i=document.getElementById('t-input');if(i)i.focus();},50);
  autoSpeak();

function typeKey(e){if(e.key==='Enter')checkType();}
function checkType(){
  const inp=document.getElementById('t-input'),ans=document.getElementById('t-ans');
  if(!inp||!ans)return;
  const filt=getFiltered(),w=filt[Math.min(idx,filt.length-1)];
  const val=inp.value.trim().toLowerCase(),correct=w.en.toLowerCase();
  if(val===correct){
    inp.classList.add('correct');inp.classList.remove('wrong');
    ans.textContent='✓ 正解！';ans.style.color='#27ae60';
    speak(w.en);knownType.add(w.orig);updateStats();
    setTimeout(()=>navigate(1),1000);
  } else {
    inp.classList.add('wrong');inp.classList.remove('correct');
    ans.innerHTML='✗ 正解：<strong>'+w.en+'</strong>';ans.style.color='var(--accent)';
    speak(w.en);
  }
}

// ── Slide ────────────────────────────────────────────────
function renderSlide(){
  const filt=getFiltered();
  const cardWrap=document.getElementById('slide-card-wrap');
  if(!cardWrap) return;
  if(!filt.length){cardWrap.innerHTML=`<div class="empty-filter">📭 このフィルターに単語がありません</div>`;return;}
  const w=filt[Math.min(idx,filt.length-1)],oi=w.orig;
  cardWrap.innerHTML=`
    ${bmRowHtml(oi)}
    <div class="slide-card">
      ${bmDotsHtml(oi)}
      <div class="slide-jp">${w.jp.replace(/\n/g,'<br>')}</div>
      <div class="slide-en">${w.en.replace(/\n/g,"<br>")}</div>
      <div class="slide-speak">${speakBtnHtml(w.en)}</div>
    </div>
    <div style="text-align:center;font-size:16px;font-weight:600;color:var(--accent2);margin-top:10px;cursor:pointer;padding:8px;border-radius:8px;border:1.5px solid var(--accent2)" onclick="jumpToCard()" title="番号を入力してジャンプ">${Math.min(idx,filt.length-1)+1} / ${filt.length} ✈</div>
  `;
}

function startSlide(){
  const sb=document.getElementById('slide-start-btn'),st=document.getElementById('slide-stop-btn');
  if(sb)sb.style.display='none';if(st)st.style.display='';

  const filt=getFiltered();
  if(!filt.length)return;
  const w=filt[Math.min(idx,filt.length-1)];

  if(window.electronTTS){
    speak(w.en);
    // 読み上げ時間を概算してからタイマー開始
    const dur = Math.max(w.en.length * 90 + 1500, 2000);
    slideTimer = setTimeout(()=>{
      navigate(1);
      startSlide();
    }, dur + slideSpeed*1000);
    return;
  }

  // ブラウザ環境: Web Speech API
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(w.en);
  utt.lang='en-US';
  if(selectedVoice) utt.voice=selectedVoice;
  utt.rate=parseFloat(document.getElementById('rate-sl')?.value||1);
  utt.volume=parseFloat(document.getElementById('vol-sl')?.value||1);
  utt.onend=()=>{
    slideTimer=setTimeout(()=>{
      navigate(1);
      renderSlide();
      startSlide();
    }, slideSpeed*1000);
  };
  window.speechSynthesis.speak(utt);
}
function stopSlide(){
  if(slideTimer){clearTimeout(slideTimer);slideTimer=null;}
  const sb=document.getElementById('slide-start-btn'),st=document.getElementById('slide-stop-btn');
  if(sb)sb.style.display='';if(st)st.style.display='none';
  if(window.electronTTS){window.electronTTS.stop();return;}
  window.speechSynthesis.cancel();
}

function jumpToCard(){
  const filt=getFiltered();
  let el=document.getElementById('wh-jump-modal');
  if(!el){el=document.createElement('div');el.id='wh-jump-modal';document.body.appendChild(el);}
  el.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center';
  el.innerHTML=`<div style="background:var(--card);border-radius:14px;padding:28px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.2)">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink)">✈ カードにジャンプ</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">番号を入力 (1～${filt.length})</div>
    <input id="wh-jump-input" type="number" min="1" max="${filt.length}" style="width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;font-size:18px;text-align:center;font-family:BIZ UDGothic,sans-serif;background:var(--paper);color:var(--ink);outline:none">
    <div style="display:flex;gap:10px;margin-top:16px">
      <button onclick="document.getElementById('wh-jump-modal').style.display='none'" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--paper);cursor:pointer;font-family:BIZ UDGothic,sans-serif">キャンセル</button>
      <button onclick="doJump()" style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:BIZ UDGothic,sans-serif;font-weight:600">ジャンプ</button>
    </div>
  </div>`;
  el.onclick=function(e){if(e.target===el)el.style.display='none';};
  setTimeout(()=>{const inp=document.getElementById('wh-jump-input');if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')doJump();});}},50);
}

function doJump(){
  const filt=getFiltered();
  const inp=document.getElementById('wh-jump-input');
  if(!inp)return;
  const n=parseInt(inp.value);
  document.getElementById('wh-jump-modal').style.display='none';
  if(isNaN(n)||n<1||n>filt.length)return;
  idx=n-1;
  updateStats();
  if(mode==='flash')renderFlash();
  else if(mode==='type')renderType();
  else if(mode==='slide')renderSlide();
  saveProgress();
}

  var jp=document.getElementById('edit-jp');
  var en=document.getElementById('edit-en');
  var ph=document.getElementById('edit-ph');
  var note=document.getElementById('edit-note');
  if(jp) jp.value=w.jp||'';
  if(en) en.value=w.en||'';
  if(ph) ph.value=w.ph||'';
  if(note) note.value=w.note||'';
  document.getElementById('wh-editcard-modal')._editOrig=oi;
  document.getElementById('wh-editcard-modal').style.display='flex';
}

function showEditCard(){
  const filt=getFiltered();
  if(!filt.length) return;
  const w=filt[Math.min(getIdx(),filt.length-1)];
  var jp=document.getElementById('edit-jp');
  var en=document.getElementById('edit-en');
  var ph=document.getElementById('edit-ph');
  var note=document.getElementById('edit-note');
  if(jp) jp.value=w.jp||'';
  if(en) en.value=w.en||'';
  if(ph) ph.value=w.ph||'';
  if(note) note.value=w.note||'';
  document.getElementById('wh-editcard-modal')._editOrig=w.orig;

function doEditCard(){
  const modal=document.getElementById('wh-editcard-modal');
  const oi=modal._editOrig;
  if(oi===undefined) return;
  const jp=(document.getElementById('edit-jp')?.value||'').trim();
  const en=(document.getElementById('edit-en')?.value||'').trim();
  const ph=(document.getElementById('edit-ph')?.value||'').trim();
  const note=(document.getElementById('edit-note')?.value||'').trim();
  if(!jp||!en){alert('日本語と英語は必須です');return;}
  modal.style.display='none';
  words[oi]={...words[oi], jp, en, ph, note};
  saveProgress();
  updateStats();
  if(mode==='flash')renderFlash();
  else if(mode==='type')renderType();
  else if(mode==='slide')renderSlide();
  else if(mode==='list')renderList();
  showToast('カードを更新しました');
}

function showAddCard(){
  // 入力欄をクリア
  ['add-jp','add-en','add-ph'].forEach(function(id){
    var inp=document.getElementById(id);
    if(inp) inp.value='';
  });
  var el=document.getElementById('wh-addcard-modal');
  if(el){el.style.display='flex';}
  setTimeout(function(){var i=document.getElementById('add-jp');if(i)i.focus();},100);
}

function doAddCard(){
  const jp=(document.getElementById('add-jp')?.value||'').trim();
  const en=(document.getElementById('add-en')?.value||'').trim();
  const ph=(document.getElementById('add-ph')?.value||'').trim();
  if(!jp||!en){alert('日本語と英語の両方を入力してください');return;}
  document.getElementById('wh-addcard-modal').style.display='none';
  // 現在のカードの直後に挿入
  const insertAt=Math.min(getIdx()+1, words.length);
  words.splice(insertAt, 0, {jp, en, ph});
  saveProgress();
  updateStats();
  if(mode==='flash')renderFlash();
  else if(mode==='type')renderType();
  else if(mode==='slide')renderSlide();
  else if(mode==='list')renderList();
  showToast('カードを追加しました：'+jp+' / '+en);
}

function saveToExcel(){
  if(!words.length){alert('データがありません');return;}
  try{
    const wb=XLSX.utils.book_new();
    const data=words.map(w=>[w.jp, w.ph ? w.en+'\n'+w.ph : w.en]);
    const ws=XLSX.utils.aoa_to_sheet(data);
    // 折り返し設定（wrapText）
    const range=XLSX.utils.decode_range(ws['!ref']);
    for(let R=range.s.r;R<=range.e.r;R++){
      const cell=ws[XLSX.utils.encode_cell({r:R,c:1})];
      if(cell){
        if(!cell.s) cell.s={};
        cell.s.alignment={wrapText:true};
      }
    }
    // 列幅設定
    ws['!cols']=[{wch:20},{wch:40}];
    XLSX.utils.book_append_sheet(wb, ws, 'Words');
    // ファイル名を現在のファイル名から取得
    const disp=document.getElementById('file-name-display')?.textContent||'wordholic';
    const fname=disp.replace(/^📄\s*/,'').replace(/\.[^.]+$/,'')||'wordholic';
    XLSX.writeFile(wb, fname+'_updated.xlsx');
    showToast('Excel保存しました：'+fname+'_updated.xlsx');
  }catch(e){
    alert('保存エラー：'+e.message);
  }
}

function doSearch(q){
  searchQuery=q.trim();
  const btn=document.getElementById('search-clear-btn');
  if(btn) btn.style.display=searchQuery?'':'none';
  // 検索時はidxをリセット（フラッシュはリセットしない）
  if(mode==='type')idxType=0;
  else if(mode==='slide')idxSlide=0;
  updateStats();
  if(mode==='flash')renderFlash();
  else if(mode==='type')renderType();
  else if(mode==='slide')renderSlide();
  else if(mode==='list')renderList();
}

function clearSearch(){
  searchQuery='';
  const inp=document.getElementById('search-input');
  if(inp) inp.value='';
  const btn=document.getElementById('search-clear-btn');
  if(btn) btn.style.display='none';
  if(mode==='flash')idxFlash=0;
  else if(mode==='type')idxType=0;
  else idxSlide=0;
  updateStats();
  if(mode==='flash')renderFlash();
  else if(mode==='type')renderType();
  else if(mode==='slide')renderSlide();
  else if(mode==='list')renderList();
}

function adjustStudyCount(oi, delta){
  const cur=studyCount[oi]||0;
  const next=Math.max(0, cur+delta);
  if(next===0) delete studyCount[oi]; else studyCount[oi]=next;
  // 学習済状態も連動
  // adjustStudyCountはフラッシュモードの学習済と連動
  if(next===0) knownFlash.delete(oi);
  else knownFlash.add(oi);
  updateStats();
  saveProgress();
  renderList();
}

// ── List ─────────────────────────────────────────────────
function renderList(){
  const filt=getFiltered(),el=document.getElementById('mode-list');
  if(!filt.length){el.innerHTML=`<div class="empty-filter">📭 このフィルターに単語がありません</div>`;return;}
  const rows=filt.map((w,i)=>{
    const oi=w.orig;
    const dots=(pronBM.has(oi)?'<span class="bm-icon pron"></span>':'')+(memBM.has(oi)?'<span class="bm-icon mem"></span>':'');
    return`<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td style="font-family:'BIZ UDGothic',sans-serif;cursor:pointer" onclick="idx=${i};setMode('flash')">${dots}${w.jp}</td>
      <td style="font-family:'BIZ UDGothic',sans-serif;font-style:italic">${w.en}</td>
      <td><button class="list-speak-btn" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button></td>
      <td style="font-size:11px">
        <span style="color:${knownFlash.has(oi)?'#27ae60':'#ccc'}">🃏</span>
        <span style="color:${knownType.has(oi)?'#27ae60':'#ccc'}">⌨️</span>
        <span style="color:${knownSlide.has(oi)?'#27ae60':'#ccc'}">▶️</span>
      </td>
      <td style="font-size:12px;color:var(--muted)">
        <span style="font-weight:600">${studyCount[oi]||0}</span>
        <button onclick="adjustStudyCount(${oi},1)" style="padding:2px 6px;font-size:11px;margin-left:4px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:var(--card)">+</button>
        <button onclick="adjustStudyCount(${oi},-1)" style="padding:2px 6px;font-size:11px;margin-left:2px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:var(--card)">-</button>
      </td>
      <td>
        <button class="bm-btn ${pronBM.has(oi)?'on-pron':'off'}" style="padding:4px 10px;font-size:11px" onclick="toggleBM('pron',${oi})">🎤</button>
        <button class="bm-btn ${memBM.has(oi)?'on-mem':'off'}" style="padding:4px 10px;font-size:11px;margin-left:4px" onclick="toggleBM('mem',${oi})">💡</button>
        <button style="padding:4px 10px;font-size:11px;margin-left:4px;border:1px solid var(--accent2);border-radius:14px;background:var(--card);color:var(--accent2);cursor:pointer" onclick="showEditCardByOrig(${oi})">✏️</button>
      </td>
    </tr>`;
  }).join('');
  el.innerHTML=`<table class="list-table">
    <thead><tr><th>#</th><th>日本語</th><th>English</th><th>🔊</th><th>🃏⌨️▶️</th><th>回数</th><th>ブックマーク</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// 起動時：前回データがあれば自動復元、なければサンプル
(function(){
  const restored=tryAutoRestore();
  if(restored){
    init(true);
  } else {
    loadDemo();
  }
})();
</script>
